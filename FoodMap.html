<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealTok | Student Resources</title>
    <link rel="stylesheet" href="FoodMap.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Monoton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<header class="main-header">
    <div class="logo-area">
        <h1 class="app-name">DEALTOK</h1>
    </div>
    <nav class="category-bar">
        <button class="nav-item active" onclick="handleTopNav('all')">All</button>
        <button class="nav-item" onclick="handleTopNav('food')">Food & Drink</button>
        <button class="nav-item" onclick="handleTopNav('beauty')">Beauty</button>
        <button class="nav-item" onclick="handleTopNav('fashion')">Fashion</button>
        <button class="nav-item" onclick="handleTopNav('study')">Study</button>
        <button class="nav-item" onclick="handleTopNav('tech')">Tech</button>
        <button class="nav-item" onclick="handleTopNav('events')">Events</button>
    </nav>
</header>

<div id="sideFilterMenu" class="side-menu">
    <button class="close-btn" onclick="closeSideMenu()">×</button>
    <h3 id="sideMenuTitle">Filters</h3>
    <hr>
    <div id="filterOptionsList"></div>
</div>

<div id="map"></div>

<button id="aiToggle" onclick="toggleChat()">✨ Ask DealBot</button>

<div id="chatDrawer" class="drawer">
    <div class="drawer-header">
        <h3>DealBot AI</h3>
        <button onclick="toggleChat()">×</button>
    </div>
    <div id="chatDisplay"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Find me free food...">
        <button onclick="askGemini()">Send</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="FoodMap.js"></script>
</body>
</html>
